<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mempool Optimizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>⛓ Mempool Optimizer</h1>
      <div class="status-pill" id="status">Connecting...</div>
    </div>
    <p class="subtitle">Live Bitcoin transaction fee tracker — sat/vB</p>
  </header>

  <main>

    <!-- ── Fee Tier Cards ─────────────────────────────── -->
    <section class="cards">

      <div class="card high">
        <div class="card-label">🚀 High Priority</div>
        <div class="card-fee" id="fee-high">—</div>
        <div class="card-unit">sat/vB</div>
        <div class="card-desc">Next block (~10 min)</div>
      </div>

      <div class="card medium">
        <div class="card-label">🚌 Medium Priority</div>
        <div class="card-fee" id="fee-medium">—</div>
        <div class="card-unit">sat/vB</div>
        <div class="card-desc">Within 3 blocks (~30 min)</div>
      </div>

      <div class="card low">
        <div class="card-label">🐢 Low Priority</div>
        <div class="card-fee" id="fee-low">—</div>
        <div class="card-unit">sat/vB</div>
        <div class="card-desc">Within 6 blocks (~1 hour)</div>
      </div>

    </section>

    <!-- ── Live Chart ─────────────────────────────────── -->
    <section class="chart-section">
      <div class="chart-header">
        <h2>Fee Rate History</h2>
        <span class="chart-note">Last 30 updates</span>
      </div>
      <div class="chart-wrapper">
        <canvas id="feeChart"></canvas>
      </div>
    </section>

    <!-- ── Last Updated ───────────────────────────────── -->
    <div class="last-updated">
      Last updated: <span id="last-updated">—</span>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="main.js"></script>

</body>
</html>
